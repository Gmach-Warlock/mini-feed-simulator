<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik+Glitch&display=swap"
      rel="stylesheet"
    />

    <title>Mini Feed Simulator</title>
  </head>
  <body>
    <div class="page">
      <h1 class="page__title">Mini Feed Simulator</h1>

      <div class="card feed">
        <h2 class="section__title feed__title">Posts</h2>
        <ul class="feed__container">
          <li class="feed__item">
            <p>Welcome to Mini Feed Simulator!!!</p>
            <p>
              Click <strong>Get Feed</strong> or <strong>Add a Post</strong> to
              load the posts!
            </p>
          </li>
        </ul>
      </div>

      <section class="feed__controls">
        <button type="button" class="btn btn--feed">Get Feed</button>

        <button type="button" class="btn btn--sort btn--timestamp">
          Sort by Newest
        </button>
        <button type="button" class="btn btn--sort btn--likes">
          Sort by Likes
        </button>
      </section>

      <section class="card card--add">
        <form placeholder="Enter your username" class="add__form">
          <h2 class="section__title add__title">Add a Post</h2>
          <div>
            <input
              type="text"
              name="newPost-username"
              id="newPost-username"
              title="newPost username"
              aria-label="new post username"
              placeholder="Enter your username"
              class="section__input add__input"
            />
          </div>
          <div>
            <textarea
              type="text"
              name="post-content"
              id="post-content"
              title="post content"
              aria-label="post content"
              placeholder="Enter you post here"
              rows="2"
              class="section__text-area add__text-area"
            ></textarea>
          </div>
          <div>
            <button type="submit" class="btn btn--primary">Add Post</button>
          </div>
        </form>
      </section>

      <section class="card posts--find">
        <h2 class="section__title find__title">Find posts by username</h2>

        <div>
          <ul class="find__feed"></ul>
        </div>

        <form action="/" class="find__form">
          <div>
            <input
              type="text"
              name="getPostsByUsername-username-input"
              id="getPostsByUsername-username-input"
              title="getPostsByUsername username input"
              aria-label="get posts by username input"
              placeholder="Enter username"
              class="section__input find__input"
            />
          </div>

          <div class="find__submit">
            <button
              type="submit"
              name="find posts by username button"
              class="btn btn--primary"
              id="getPostsByUsername-button"
              title="find posts by username button"
            >
              Find Posts
            </button>
          </div>
        </form>
      </section>

      <footer class="page__footer">&copy;2026 GMach</footer>
    </div>

    <script src="index.js"></script>
  </body>
</html>
